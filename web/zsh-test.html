<!DOCTYPE html>
<html>
<head>
    <title>zsh wasm test</title>
    <style>
        body { font-family: monospace; padding: 2em; background: #1a1a1a; color: #eee; }
        pre  { background: #111; padding: 1em; border-radius: 4px; white-space: pre-wrap; }
        h2   { color: #adf; }
    </style>
</head>
<body>
    <h1>zsh-wasm test</h1>

    <h2>Test 1: basic echo</h2>
    <pre id="out1"></pre>
    <script type="text/zsh" data-stdout="#out1">
echo "Hello from zsh!"
echo "zsh version: $ZSH_VERSION"
    </script>

    <h2>Test 2: arithmetic</h2>
    <pre id="out2"></pre>
    <script type="text/zsh" data-stdout="#out2">
x=6
y=7
echo "$x * $y = $(( x * y ))"
    </script>

    <h2>Test 3: arrays</h2>
    <pre id="out3"></pre>
    <script type="text/zsh" data-stdout="#out3">
fruits=(apple banana cherry)
for f in $fruits; do
    echo "fruit: $f"
done
echo "count: ${#fruits}"
    </script>

    <h2>Test 4: string operations</h2>
    <pre id="out4"></pre>
    <script type="text/zsh" data-stdout="#out4">
s="Hello, World!"
echo "upper: ${s:u}"
echo "lower: ${s:l}"
echo "length: ${#s}"
echo "slice: ${s:0:5}"
    </script>

    <script src="./zsh.js"></script>
    <script src="./zsh-loader.js" type="module"></script>
</body>
</html>
