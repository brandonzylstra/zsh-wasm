<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>zsh-wasm tests</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Courier New', monospace;
    background: #0d1117;
    color: #c9d1d9;
    padding: 2rem;
    margin: 0;
  }
  h1 { color: #f0f6fc; margin: 0 0 1rem; font-size: 1.4rem; }
  #summary {
    font-size: 1rem;
    margin-bottom: 1.5rem;
    padding: 0.6rem 1rem;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
  }
  #summary.all-pass { border-color: #3fb950; color: #3fb950; }
  #summary.has-fail { border-color: #f85149; color: #f85149; }
  table { border-collapse: collapse; width: 100%; font-size: 0.85rem; }
  th {
    text-align: left;
    padding: 0.4rem 0.8rem;
    background: #161b22;
    color: #8b949e;
    border-bottom: 1px solid #30363d;
  }
  td { padding: 0.35rem 0.8rem; border-bottom: 1px solid #21262d; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  .status-pass  { color: #3fb950; }
  .status-fail  { color: #f85149; }
  .status-run   { color: #e3b341; }
  .status-xfail { color: #8b949e; }
  .test-name { color: #79c0ff; }
  pre.detail {
    margin: 0.3rem 0 0;
    padding: 0.5rem;
    background: #161b22;
    border-radius: 4px;
    white-space: pre-wrap;
    font-size: 0.8rem;
    color: #8b949e;
  }
</style>
</head>
<body>
<h1>zsh-wasm test suite</h1>
<div id="summary">Initializing…</div>
<table>
  <thead><tr><th>Test</th><th>Status</th><th>Expected / Actual</th></tr></thead>
  <tbody id="results"></tbody>
</table>

<script type="module">
import { runZshScript } from './zsh-runtime.js';

const tests = [
    // basic shell
    { name: 'echo',
      script: 'echo hello',
      expected: 'hello' },
    { name: 'variable',
      script: 'x=42\necho $x',
      expected: '42' },
    { name: 'array-count',
      script: 'a=(x y z)\necho ${#a}',
      expected: '3' },
    { name: 'arithmetic',
      script: 'echo $(( 3 + 4 * 2 ))',
      expected: '11' },
    { name: 'string-lower',
      script: 's=HELLO\necho ${s:l}',
      expected: 'hello' },
    // control flow
    { name: 'if',
      script: 'if [[ 1 -eq 1 ]]; then echo yes; fi',
      expected: 'yes' },
    { name: 'for-loop',
      script: 'for i in 1 2 3; do echo $i; done',
      expected: '1\n2\n3' },
    { name: 'function',
      script: 'greet() { echo "hi $1" }\ngreet world',
      expected: 'hi world' },
    // file shims
    { name: 'touch-cat',
      script: 'touch /tmp/tc.txt\necho hello > /tmp/tc.txt\ncat /tmp/tc.txt',
      expected: 'hello' },
    { name: 'cp',
      script: 'echo foo > /tmp/cpsrc.txt\ncp /tmp/cpsrc.txt /tmp/cpdst.txt\ncat /tmp/cpdst.txt',
      expected: 'foo' },
    { name: 'mv',
      script: 'echo bar > /tmp/mvsrc.txt\nmv /tmp/mvsrc.txt /tmp/mvdst.txt\ncat /tmp/mvdst.txt',
      expected: 'bar' },
    { name: 'wc',
      script: "printf 'a\\nb\\nc\\n' > /tmp/wc.txt\nwc /tmp/wc.txt",
      expected: '3 3 6 /tmp/wc.txt' },
    { name: 'wc-l',
      script: "printf 'a\\nb\\nc\\n' > /tmp/wcl.txt\nwc -l /tmp/wcl.txt",
      expected: '3 /tmp/wcl.txt' },
    { name: 'wc-w',
      script: "printf 'hello world\\nfoo\\n' > /tmp/wcw.txt\nwc -w /tmp/wcw.txt",
      expected: '3 /tmp/wcw.txt' },
    { name: 'wc-c',
      script: "printf 'hello\\n' > /tmp/wcc.txt\nwc -c /tmp/wcc.txt",
      expected: '6 /tmp/wcc.txt' },
    { name: 'head',
      script: "printf 'l1\\nl2\\nl3\\nl4\\nl5\\n' > /tmp/hd.txt\nhead -n 3 /tmp/hd.txt",
      expected: 'l1\nl2\nl3' },
    { name: 'tail',
      script: "printf 'l1\\nl2\\nl3\\nl4\\nl5\\n' > /tmp/tl.txt\ntail -n 2 /tmp/tl.txt",
      expected: 'l4\nl5' },
    { name: 'grep',
      script: "printf 'apple\\nbanana\\ncherry\\n' > /tmp/gr.txt\ngrep an /tmp/gr.txt",
      expected: 'banana' },
    { name: 'grep-i',
      script: "printf 'Apple\\nbanana\\nCherry\\n' > /tmp/gri.txt\ngrep -i apple /tmp/gri.txt",
      expected: 'Apple' },
    { name: 'grep-v',
      script: "printf 'apple\\nbanana\\ncherry\\n' > /tmp/grv.txt\ngrep -v an /tmp/grv.txt",
      expected: 'apple\ncherry' },
    { name: 'grep-n',
      script: "printf 'apple\\nbanana\\ncherry\\n' > /tmp/grn.txt\ngrep -n an /tmp/grn.txt",
      expected: '2:banana' },
    { name: 'grep-c',
      script: "printf 'apple\\nbanana\\ncherry\\n' > /tmp/grc.txt\ngrep -c an /tmp/grc.txt",
      expected: '1' },
    { name: 'grep-anchor-start',
      script: "printf 'apple\\nbanana\\napricot\\n' > /tmp/gra.txt\ngrep '^a' /tmp/gra.txt",
      expected: 'apple\napricot' },
    { name: 'grep-anchor-end',
      script: "printf 'apple\\nbanana\\ncherry\\n' > /tmp/gre.txt\ngrep 'a$' /tmp/gre.txt",
      expected: 'banana' },
    { name: 'grep-alternation',
      script: "printf 'apple\\nbanana\\ncherry\\n' > /tmp/gral.txt\ngrep 'apple|cherry' /tmp/gral.txt",
      expected: 'apple\ncherry' },
    { name: 'grep-char-class',
      script: "printf 'cat\\ndog\\ncow\\n' > /tmp/grcc.txt\ngrep 'c[ao]' /tmp/grcc.txt",
      expected: 'cat\ncow' },
    // ls
    { name: 'ls-basic',
      script: 'mkdir -p /tmp/ls1\ntouch /tmp/ls1/a.txt /tmp/ls1/b.txt\nls /tmp/ls1',
      expected: 'a.txt\nb.txt' },
    { name: 'ls-hidden',
      script: 'mkdir -p /tmp/ls2\ntouch /tmp/ls2/.dot /tmp/ls2/vis\nls -a /tmp/ls2',
      expected: '.dot\nvis' },
    { name: 'ls-long',
      script: 'mkdir -p /tmp/ls3\necho hi > /tmp/ls3/f.txt\nls -l /tmp/ls3',
      expected_contains: 'f.txt' },
    { name: 'ls-recursive',
      script: 'mkdir -p /tmp/ls4/sub\ntouch /tmp/ls4/a.txt /tmp/ls4/sub/b.txt\nls -R /tmp/ls4',
      expected_contains: 'sub/b.txt' },
    // globs
    { name: 'glob',
      script: 'mkdir -p /tmp/gl\ntouch /tmp/gl/a.txt /tmp/gl/b.log\necho /tmp/gl/*.txt',
      expected: '/tmp/gl/a.txt' },
    { name: 'recursive-glob',
      script: 'mkdir -p /tmp/rg/sub\ntouch /tmp/rg/a.sh /tmp/rg/sub/b.sh\necho /tmp/rg/**/*.sh',
      expected: '/tmp/rg/a.sh /tmp/rg/sub/b.sh' },
    // modules
    { name: 'datetime',
      script: 'zmodload zsh/datetime\necho $((EPOCHSECONDS > 0))',
      expected: '1' },
    // new shims
    { name: 'date',
      script: 'date +%Y',
      expected: '2026' },
    { name: 'sort',
      script: "printf 'banana\\napple\\ncherry\\n' > /tmp/so.txt\nsort /tmp/so.txt",
      expected: 'apple\nbanana\ncherry' },
    { name: 'sort-r',
      script: "printf 'banana\\napple\\ncherry\\n' > /tmp/sor.txt\nsort -r /tmp/sor.txt",
      expected: 'cherry\nbanana\napple' },
    { name: 'sort-n',
      script: "printf '10\\n9\\n2\\n100\\n' > /tmp/son.txt\nsort -n /tmp/son.txt",
      expected: '2\n9\n10\n100' },
    { name: 'sort-u',
      script: "printf 'b\\na\\nb\\na\\nc\\n' > /tmp/sou.txt\nsort -u /tmp/sou.txt",
      expected: 'a\nb\nc' },
    { name: 'uniq',
      script: "printf 'a\\na\\nb\\nb\\nb\\nc\\n' > /tmp/uq.txt\nuniq /tmp/uq.txt",
      expected: 'a\nb\nc' },
    { name: 'cut',
      script: "printf 'root:x:0\\nuser:x:1\\n' > /tmp/ct.txt\ncut -d: -f1 /tmp/ct.txt",
      expected: 'root\nuser' },
    { name: 'cut-multi-field',
      script: "printf 'a:b:c:d\\n1:2:3:4\\n' > /tmp/ctm.txt\ncut -d: -f1,3 /tmp/ctm.txt",
      expected: 'a:c\n1:3' },
    { name: 'cut-field-range',
      script: "printf 'a:b:c:d\\n1:2:3:4\\n' > /tmp/ctr.txt\ncut -d: -f2-3 /tmp/ctr.txt",
      expected: 'b:c\n2:3' },
    { name: 'tr',
      script: 'echo hello > /tmp/tr.txt\ntr \'a-z\' \'A-Z\' < /tmp/tr.txt',
      expected: 'HELLO' },
    { name: 'tr-delete',
      script: "printf 'hello world\\n' > /tmp/trd.txt\ntr -d 'aeiou' < /tmp/trd.txt",
      expected: 'hll wrld' },
    // stdin
    { name: 'stdin',
      script: 'while IFS= read -r line; do echo "> $line"; done',
      stdin: 'hello\nworld',
      expected: '> hello\n> world' },
    // exit code
    { name: 'exit-code',
      script: 'exit 42',
      expected: '',
      expectedExitCode: 42 },
    // stdin without trailing newline (we append \n — verify last line reads)
    { name: 'stdin-no-trailing-nl',
      script: 'while IFS= read -r line; do echo "$line"; done',
      stdin: 'a\nb\nc',
      expected: 'a\nb\nc' },
    // grep uses =~ regex: . matches any character
    { name: 'grep-dot-regex',
      script: "printf 'hello\\nhxllo\\n' > /tmp/gd.txt\ngrep 'h.llo' /tmp/gd.txt",
      expected: 'hello\nhxllo' },
    // =~ (POSIX regex via zsh/regex module, linked statically)
    { name: 'regex-basic',
      script: '[[ hello =~ ell ]] && echo yes || echo no',
      expected: 'yes' },
    { name: 'regex-dot',
      script: '[[ hello =~ h.llo ]] && echo yes || echo no',
      expected: 'yes' },
    { name: 'regex-no-match',
      script: '[[ hello =~ xyz ]] && echo yes || echo no',
      expected: 'no' },
    // control flow (extended)
    { name: 'while-loop',
      script: 'i=1; while (( i <= 3 )); do echo $i; (( i++ )); done',
      expected: '1\n2\n3' },
    { name: 'case-stmt',
      script: 'x=hello; case $x in hello) echo yes ;; *) echo no ;; esac',
      expected: 'yes' },
    { name: 'command-subst',
      script: 'result=$(echo hello); echo $result',
      expected: 'hello' },
    // head/tail defaults
    { name: 'head-default',
      script: "printf 'l1\\nl2\\nl3\\nl4\\nl5\\nl6\\nl7\\nl8\\nl9\\nl10\\nl11\\nl12\\n' > /tmp/hddef.txt\nhead /tmp/hddef.txt",
      expected: 'l1\nl2\nl3\nl4\nl5\nl6\nl7\nl8\nl9\nl10' },
    { name: 'tail-default',
      script: "printf 'l1\\nl2\\nl3\\nl4\\nl5\\nl6\\nl7\\nl8\\nl9\\nl10\\nl11\\nl12\\n' > /tmp/tldef.txt\ntail /tmp/tldef.txt",
      expected: 'l3\nl4\nl5\nl6\nl7\nl8\nl9\nl10\nl11\nl12' },
    // grep regex quantifiers
    { name: 'grep-plus',
      script: "printf 'a\\naa\\naaa\\nb\\n' > /tmp/grplus.txt\ngrep 'a+' /tmp/grplus.txt",
      expected: 'a\naa\naaa' },
    { name: 'grep-optional',
      script: "printf 'ct\\ncat\\ncaat\\n' > /tmp/gropt.txt\ngrep 'ca?t' /tmp/gropt.txt",
      expected: 'ct\ncat' },
    { name: 'grep-braces',
      script: "printf 'cat\\ncaat\\ncaaat\\n' > /tmp/grbrk.txt\ngrep 'ca{2}t' /tmp/grbrk.txt",
      expected: 'caat' },
    // grep multiple files
    { name: 'grep-multifile',
      script: "printf 'hello\\n' > /tmp/gmf1.txt\nprintf 'world\\n' > /tmp/gmf2.txt\ngrep 'o' /tmp/gmf1.txt /tmp/gmf2.txt",
      expected: 'hello\nworld' },
    // sort combined flags
    { name: 'sort-rn',
      script: "printf '10\\n9\\n2\\n100\\n' > /tmp/srn.txt\nsort -rn /tmp/srn.txt",
      expected: '100\n10\n9\n2' },
    // cut open-ended ranges
    { name: 'cut-open-end',
      script: "printf 'a:b:c:d\\n1:2:3:4\\n' > /tmp/ctoe.txt\ncut -d: -f3- /tmp/ctoe.txt",
      expected: 'c:d\n3:4' },
    { name: 'cut-open-start',
      script: "printf 'a:b:c:d\\n1:2:3:4\\n' > /tmp/ctos.txt\ncut -d: -f-2 /tmp/ctos.txt",
      expected: 'a:b\n1:2' },
    // wc multiple files
    { name: 'wc-multifile',
      script: "printf 'a\\nb\\n' > /tmp/wm1.txt\nprintf 'x\\ny\\nz\\n' > /tmp/wm2.txt\nwc -l /tmp/wm1.txt /tmp/wm2.txt",
      expected: '2 /tmp/wm1.txt\n3 /tmp/wm2.txt' },
    // sed: basic substitution (uses file arg; C-level stdin bypasses zsh pipe sim)
    { name: 'sed-sub',
      script: "printf 'hello world\\n' > /tmp/ss.txt\nsed 's/world/zsh/' /tmp/ss.txt",
      expected: 'hello zsh' },
    // sed: global substitution
    { name: 'sed-sub-global',
      script: "printf 'aabbaa\\n' > /tmp/ssg.txt\nsed 's/a/x/g' /tmp/ssg.txt",
      expected: 'xxbbxx' },
    // sed: delete matching lines
    { name: 'sed-delete',
      script: "printf 'keep\\ndelete me\\nkeep too\\n' > /tmp/sd.txt\nsed '/delete/d' /tmp/sd.txt",
      expected: 'keep\nkeep too' },
    // sed: print only matching lines (-n with /p)
    { name: 'sed-print-match',
      script: "printf 'apple\\nbanana\\napricot\\n' > /tmp/spm.txt\nsed -n '/^a/p' /tmp/spm.txt",
      expected: 'apple\napricot' },
    // sed: multiple -e expressions
    { name: 'sed-multi-expr',
      script: "printf 'foo bar\\n' > /tmp/sme.txt\nsed -e 's/foo/baz/' -e 's/bar/qux/' /tmp/sme.txt",
      expected: 'baz qux' },
    // sed: address range substitution
    { name: 'sed-addr-range',
      script: "printf 'a\\nb\\nc\\nd\\n' > /tmp/sar.txt\nsed '2,3s/.*/X/' /tmp/sar.txt",
      expected: 'a\nX\nX\nd' },
    // string operations (parameter expansion — no fork)
    { name: 'string-length',
      script: 's=hello; echo ${#s}',
      expected: '5' },
    { name: 'string-slice',
      script: 's=hello; echo ${s:1:3}',
      expected: 'ell' },
    { name: 'string-replace',
      script: 's=hello; echo ${s/l/r}',
      expected: 'herlo' },
    { name: 'string-strip-prefix',
      script: 's=foobar; echo ${s#foo}',
      expected: 'bar' },
    { name: 'string-strip-suffix',
      script: 's=foobar; echo ${s%bar}',
      expected: 'foo' },
    // brace expansion
    { name: 'brace-range',
      script: 'echo {1..5}',
      expected: '1 2 3 4 5' },
    { name: 'brace-list',
      script: 'echo {a,b,c}',
      expected: 'a b c' },
    // array operations
    { name: 'array-join',
      script: 'a=(a b c); echo ${(j:,:)a}',
      expected: 'a,b,c' },
    { name: 'array-element',
      script: 'a=(x y z); echo $a[2]',
      expected: 'y' },
    { name: 'assoc-array',
      script: 'typeset -A h; h[key]=val; echo $h[key]',
      expected: 'val' },
    // redirect
    { name: 'append-redirect',
      script: 'echo a > /tmp/ar.txt; echo b >> /tmp/ar.txt; cat /tmp/ar.txt',
      expected: 'a\nb' },
    // logical operators
    { name: 'and-chain',
      script: 'true && echo yes',
      expected: 'yes' },
    { name: 'or-chain',
      script: 'false || echo yes',
      expected: 'yes' },
    // printf format
    { name: 'printf-pad',
      script: "printf '%05d\\n' 42",
      expected: '00042' },
    // $(< file) — resolved without fork via simple_redir_name() fast path
    { name: 'file-read-subst',
      script: "echo hello > /tmp/frs.txt; echo $(< /tmp/frs.txt)",
      expected: 'hello' },
    // command substitution (requires in-process capture patch in exec.c)
    { name: 'cmd-subst-nested',
      script: 'x=$(echo world); echo hello $x',
      expected: 'hello world' },
    // zsh/files module builtins (linked statically, no fork)
    { name: 'zf-rm',
      script: "echo test > /tmp/zfr.txt; zf_rm /tmp/zfr.txt; [[ ! -f /tmp/zfr.txt ]] && echo gone || echo present",
      expected: 'gone' },
    // zsh/stat module (linked statically, no fork)
    { name: 'zstat-size',
      script: "printf 'hello\\n' > /tmp/zst.txt; zstat -H s /tmp/zst.txt; echo $s[size]",
      expected: '6' },
    // awk builtin (file-based — no fork/pipes required)
    { name: 'awk-print',
      script: "echo 'hello world' > /tmp/awk1.txt; awk '{print $2}' /tmp/awk1.txt",
      expected: 'world' },
    { name: 'awk-sum',
      script: "printf '1\\n2\\n3\\n4\\n5\\n' > /tmp/awk2.txt; awk '{s+=$1} END{print s}' /tmp/awk2.txt",
      expected: '15' },
    { name: 'awk-field-sep',
      script: "echo 'a:b:c' > /tmp/awk3.txt; awk -F: '{print $2}' /tmp/awk3.txt",
      expected: 'b' },
    { name: 'awk-pattern',
      script: "printf 'foo\\nbar\\nbaz\\n' > /tmp/awk4.txt; awk '/ba/' /tmp/awk4.txt",
      expected: 'bar\nbaz' },
    { name: 'awk-nf',
      script: "echo 'one two three' > /tmp/awk5.txt; awk '{print NF}' /tmp/awk5.txt",
      expected: '3' },
    { name: 'awk-gsub',
      script: "echo 'hello world' > /tmp/awk6.txt; awk '{gsub(/o/,\"0\"); print}' /tmp/awk6.txt",
      expected: 'hell0 w0rld' },
    { name: 'awk-var',
      script: "awk -v x=42 'BEGIN{print x}'",
      expected: '42' },
    { name: 'awk-file',
      script: "printf 'a\\nb\\nc\\n' > /tmp/awk7.txt; awk '{print NR, $0}' /tmp/awk7.txt",
      expected: '1 a\n2 b\n3 c' },
];

const tbody = document.getElementById('results');
const summary = document.getElementById('summary');
let passed = 0, failed = 0, xfailed = 0;

function addRow(name, knownFail = false) {
    const tr = document.createElement('tr');
    tr.id = 'row-' + name;
    if (knownFail) tr.setAttribute('data-known-fail', '');
    tr.innerHTML = `
        <td class="test-name">${name}</td>
        <td><span class="status-run" data-test-status="running">running</span></td>
        <td></td>`;
    tbody.appendChild(tr);
    return tr;
}

function updateRow(tr, pass, actual, expectedStr, knownFail = false) {
    const statusEl = tr.querySelector('[data-test-status]');
    if (pass) {
        statusEl.className = 'status-pass';
        statusEl.textContent = 'pass';
        statusEl.setAttribute('data-test-status', 'pass');
    } else if (knownFail) {
        statusEl.className = 'status-xfail';
        statusEl.textContent = 'xfail';
        statusEl.setAttribute('data-test-status', 'xfail');
        tr.cells[2].innerHTML =
            `<pre class="detail">expected: ${esc(expectedStr)}\n  actual: ${esc(actual)}</pre>`;
    } else {
        statusEl.className = 'status-fail';
        statusEl.textContent = 'FAIL';
        statusEl.setAttribute('data-test-status', 'fail');
        tr.cells[2].innerHTML =
            `<pre class="detail">expected: ${esc(expectedStr)}\n  actual: ${esc(actual)}</pre>`;
    }
}

function esc(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function updateSummary() {
    const total = passed + failed;
    let text = `${passed} / ${total} passed`;
    if (failed) text += ` — ${failed} FAILED`;
    if (xfailed) text += ` — ${xfailed} expected failure${xfailed > 1 ? 's' : ''}`;
    summary.textContent = text;
    summary.className = failed ? 'has-fail' : (passed + xfailed === tests.length ? 'all-pass' : '');
}

summary.textContent = `Running 0 / ${tests.length}…`;

for (const t of tests) {
    const kf = !!t.knownFail;
    const tr = addRow(t.name, kf);
    let result;
    try {
        result = await runZshScript(t.script, { stdin: t.stdin ?? null });
    } catch(e) {
        result = { stdout: '', stderr: String(e) };
    }
    const actual = result.stdout.trim();
    let pass, expectedStr;
    if (t.expected !== undefined) {
        expectedStr = t.expected;
        pass = actual === t.expected.trim();
    } else {
        expectedStr = `contains: ${t.expected_contains}`;
        pass = actual.includes(t.expected_contains);
    }
    if (pass && t.expectedExitCode !== undefined) {
        if (result.exitCode !== t.expectedExitCode) {
            pass = false;
            expectedStr += ` (exit ${t.expectedExitCode})`;
        }
    }
    if (pass) passed++;
    else if (kf) xfailed++;
    else failed++;
    updateRow(tr, pass, actual, expectedStr, kf);
    updateSummary();
}

document.body.setAttribute('data-tests-complete', '');
</script>
</body>
</html>
