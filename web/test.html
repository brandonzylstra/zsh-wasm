<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>zsh-wasm tests</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Courier New', monospace;
    background: #0d1117;
    color: #c9d1d9;
    padding: 2rem;
    margin: 0;
  }
  h1 { color: #f0f6fc; margin: 0 0 1rem; font-size: 1.4rem; }
  #summary {
    font-size: 1rem;
    margin-bottom: 1.5rem;
    padding: 0.6rem 1rem;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
  }
  #summary.all-pass { border-color: #3fb950; color: #3fb950; }
  #summary.has-fail { border-color: #f85149; color: #f85149; }
  table { border-collapse: collapse; width: 100%; font-size: 0.85rem; }
  th {
    text-align: left;
    padding: 0.4rem 0.8rem;
    background: #161b22;
    color: #8b949e;
    border-bottom: 1px solid #30363d;
  }
  td { padding: 0.35rem 0.8rem; border-bottom: 1px solid #21262d; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  .status-pass  { color: #3fb950; }
  .status-fail  { color: #f85149; }
  .status-run   { color: #e3b341; }
  .status-xfail { color: #8b949e; }
  .status-pend  { color: #484f58; }
  .test-name { color: #79c0ff; }
  pre.detail {
    margin: 0.3rem 0 0;
    padding: 0.5rem;
    background: #161b22;
    border-radius: 4px;
    white-space: pre-wrap;
    font-size: 0.8rem;
    color: #8b949e;
  }
  .rerun-btn {
    background: none;
    border: 1px solid #30363d;
    color: #8b949e;
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 0.72rem;
    cursor: pointer;
    vertical-align: middle;
    line-height: 1;
    margin-left: 4px;
  }
  .rerun-btn:not(:disabled):hover { color: #79c0ff; border-color: #79c0ff; }
  .rerun-btn:disabled { opacity: 0.25; cursor: default; }
  .test-name { cursor: pointer; user-select: none; }
  .expand-chevron { display: inline-block; font-size: 0.65rem; width: 1em; opacity: 0.4; margin-right: 2px; }
  tr.expandable:hover td { background: #111820; }
  tr.detail-row td { padding: 0 0.8rem 0.6rem 2rem; border-bottom: 1px solid #21262d; }
  tr.detail-row:last-child td { border-bottom: none; }
  pre.script-code {
    margin: 0;
    padding: 0.5rem 0.75rem;
    background: #0d1117;
    border-left: 2px solid #30363d;
    border-radius: 0 4px 4px 0;
    white-space: pre-wrap;
    font-size: 0.8rem;
    color: #e3b341;
  }
  pre.script-code .stdin-label { color: #8b949e; font-style: italic; }
  .output-section { margin-top: 0.4rem; }
  pre.output-code {
    margin: 0;
    padding: 0.5rem 0.75rem;
    background: #0d1117;
    border-left: 2px solid;
    border-radius: 0 4px 4px 0;
    white-space: pre-wrap;
    font-size: 0.8rem;
  }
  pre.output-pass { border-color: #3fb950; color: #3fb950; }
  pre.output-fail { border-color: #f85149; color: #f85149; }
  pre.output-run  { border-color: #e3b341; color: #e3b341; }
  .output-empty   { color: #484f58; font-style: italic; }
</style>
</head>
<body>
<h1>zsh-wasm test suite</h1>
<div id="summary">Initializing…</div>
<table>
  <thead><tr><th>Test</th><th>Status</th><th>Expected / Actual</th></tr></thead>
  <tbody id="results"></tbody>
</table>

<script type="module">
import { runZshScript } from './zsh-runtime.js';

const tests = [
    // basic shell
    { name: 'echo',
      script: 'echo hello',
      expected: 'hello' },
    { name: 'variable',
      script: 'x=42\necho $x',
      expected: '42' },
    { name: 'array-count',
      script: 'a=(x y z)\necho ${#a}',
      expected: '3' },
    { name: 'arithmetic',
      script: 'echo $(( 3 + 4 * 2 ))',
      expected: '11' },
    { name: 'string-lower',
      script: 's=HELLO\necho ${s:l}',
      expected: 'hello' },
    { name: 'string-upper',
      script: 's=hello\necho ${s:u}',
      expected: 'HELLO' },
    // control flow
    { name: 'if',
      script: 'if [[ 1 -eq 1 ]]; then echo yes; fi',
      expected: 'yes' },
    { name: 'for-loop',
      script: 'for i in 1 2 3; do echo $i; done',
      expected: '1\n2\n3' },
    { name: 'function',
      script: 'greet() { echo "hi $1" }\ngreet world',
      expected: 'hi world' },
    { name: 'local-var',
      script: 'f() { local x=inner; echo $x }; x=outer; f; echo $x',
      expected: 'inner\nouter' },
    // file shims
    { name: 'touch-cat',
      script: 'touch /tmp/tc.txt\necho hello > /tmp/tc.txt\ncat /tmp/tc.txt',
      expected: 'hello' },
    { name: 'cp',
      script: 'echo foo > /tmp/cpsrc.txt\ncp /tmp/cpsrc.txt /tmp/cpdst.txt\ncat /tmp/cpdst.txt',
      expected: 'foo' },
    { name: 'mv',
      script: 'echo bar > /tmp/mvsrc.txt\nmv /tmp/mvsrc.txt /tmp/mvdst.txt\ncat /tmp/mvdst.txt',
      expected: 'bar' },
    { name: 'wc',
      script: "printf 'a\\nb\\nc\\n' > /tmp/wc.txt\nwc /tmp/wc.txt",
      expected: '3 3 6 /tmp/wc.txt' },
    { name: 'wc-l',
      script: "printf 'a\\nb\\nc\\n' > /tmp/wcl.txt\nwc -l /tmp/wcl.txt",
      expected: '3 /tmp/wcl.txt' },
    { name: 'wc-w',
      script: "printf 'hello world\\nfoo\\n' > /tmp/wcw.txt\nwc -w /tmp/wcw.txt",
      expected: '3 /tmp/wcw.txt' },
    { name: 'wc-c',
      script: "printf 'hello\\n' > /tmp/wcc.txt\nwc -c /tmp/wcc.txt",
      expected: '6 /tmp/wcc.txt' },
    { name: 'head',
      script: "printf 'l1\\nl2\\nl3\\nl4\\nl5\\n' > /tmp/hd.txt\nhead -n 3 /tmp/hd.txt",
      expected: 'l1\nl2\nl3' },
    { name: 'tail',
      script: "printf 'l1\\nl2\\nl3\\nl4\\nl5\\n' > /tmp/tl.txt\ntail -n 2 /tmp/tl.txt",
      expected: 'l4\nl5' },
    { name: 'grep',
      script: "printf 'apple\\nbanana\\ncherry\\n' > /tmp/gr.txt\ngrep an /tmp/gr.txt",
      expected: 'banana' },
    { name: 'grep-i',
      script: "printf 'Apple\\nbanana\\nCherry\\n' > /tmp/gri.txt\ngrep -i apple /tmp/gri.txt",
      expected: 'Apple' },
    { name: 'grep-v',
      script: "printf 'apple\\nbanana\\ncherry\\n' > /tmp/grv.txt\ngrep -v an /tmp/grv.txt",
      expected: 'apple\ncherry' },
    { name: 'grep-n',
      script: "printf 'apple\\nbanana\\ncherry\\n' > /tmp/grn.txt\ngrep -n an /tmp/grn.txt",
      expected: '2:banana' },
    { name: 'grep-c',
      script: "printf 'apple\\nbanana\\ncherry\\n' > /tmp/grc.txt\ngrep -c an /tmp/grc.txt",
      expected: '1' },
    { name: 'grep-anchor-start',
      script: "printf 'apple\\nbanana\\napricot\\n' > /tmp/gra.txt\ngrep '^a' /tmp/gra.txt",
      expected: 'apple\napricot' },
    { name: 'grep-anchor-end',
      script: "printf 'apple\\nbanana\\ncherry\\n' > /tmp/gre.txt\ngrep 'a$' /tmp/gre.txt",
      expected: 'banana' },
    { name: 'grep-alternation',
      script: "printf 'apple\\nbanana\\ncherry\\n' > /tmp/gral.txt\ngrep 'apple|cherry' /tmp/gral.txt",
      expected: 'apple\ncherry' },
    { name: 'grep-char-class',
      script: "printf 'cat\\ndog\\ncow\\n' > /tmp/grcc.txt\ngrep 'c[ao]' /tmp/grcc.txt",
      expected: 'cat\ncow' },
    // ls
    { name: 'ls-basic',
      script: 'mkdir -p /tmp/ls1\ntouch /tmp/ls1/a.txt /tmp/ls1/b.txt\nls /tmp/ls1',
      expected: 'a.txt\nb.txt' },
    { name: 'ls-hidden',
      script: 'mkdir -p /tmp/ls2\ntouch /tmp/ls2/.dot /tmp/ls2/vis\nls -a /tmp/ls2',
      expected: '.dot\nvis' },
    { name: 'ls-long',
      script: 'mkdir -p /tmp/ls3\necho hi > /tmp/ls3/f.txt\nls -l /tmp/ls3',
      expected_contains: 'f.txt' },
    { name: 'ls-recursive',
      script: 'mkdir -p /tmp/ls4/sub\ntouch /tmp/ls4/a.txt /tmp/ls4/sub/b.txt\nls -R /tmp/ls4',
      expected_contains: 'sub/b.txt' },
    // globs
    { name: 'glob',
      script: 'mkdir -p /tmp/gl\ntouch /tmp/gl/a.txt /tmp/gl/b.log\necho /tmp/gl/*.txt',
      expected: '/tmp/gl/a.txt' },
    { name: 'recursive-glob',
      script: 'mkdir -p /tmp/rg/sub\ntouch /tmp/rg/a.sh /tmp/rg/sub/b.sh\necho /tmp/rg/**/*.sh',
      expected: '/tmp/rg/a.sh /tmp/rg/sub/b.sh' },
    // modules
    { name: 'datetime',
      script: 'zmodload zsh/datetime\necho $((EPOCHSECONDS > 0))',
      expected: '1' },
    // new shims
    { name: 'date',
      script: 'date +%Y',
      expected: '2026' },
    { name: 'sort',
      script: "printf 'banana\\napple\\ncherry\\n' > /tmp/so.txt\nsort /tmp/so.txt",
      expected: 'apple\nbanana\ncherry' },
    { name: 'sort-r',
      script: "printf 'banana\\napple\\ncherry\\n' > /tmp/sor.txt\nsort -r /tmp/sor.txt",
      expected: 'cherry\nbanana\napple' },
    { name: 'sort-n',
      script: "printf '10\\n9\\n2\\n100\\n' > /tmp/son.txt\nsort -n /tmp/son.txt",
      expected: '2\n9\n10\n100' },
    { name: 'sort-u',
      script: "printf 'b\\na\\nb\\na\\nc\\n' > /tmp/sou.txt\nsort -u /tmp/sou.txt",
      expected: 'a\nb\nc' },
    { name: 'uniq',
      script: "printf 'a\\na\\nb\\nb\\nb\\nc\\n' > /tmp/uq.txt\nuniq /tmp/uq.txt",
      expected: 'a\nb\nc' },
    { name: 'cut',
      script: "printf 'root:x:0\\nuser:x:1\\n' > /tmp/ct.txt\ncut -d: -f1 /tmp/ct.txt",
      expected: 'root\nuser' },
    { name: 'cut-multi-field',
      script: "printf 'a:b:c:d\\n1:2:3:4\\n' > /tmp/ctm.txt\ncut -d: -f1,3 /tmp/ctm.txt",
      expected: 'a:c\n1:3' },
    { name: 'cut-field-range',
      script: "printf 'a:b:c:d\\n1:2:3:4\\n' > /tmp/ctr.txt\ncut -d: -f2-3 /tmp/ctr.txt",
      expected: 'b:c\n2:3' },
    { name: 'tr',
      script: 'echo hello > /tmp/tr.txt\ntr \'a-z\' \'A-Z\' < /tmp/tr.txt',
      expected: 'HELLO' },
    { name: 'tr-delete',
      script: "printf 'hello world\\n' > /tmp/trd.txt\ntr -d 'aeiou' < /tmp/trd.txt",
      expected: 'hll wrld' },
    // stdin
    { name: 'stdin',
      script: 'while IFS= read -r line; do echo "> $line"; done',
      stdin: 'hello\nworld',
      expected: '> hello\n> world' },
    // exit code
    { name: 'exit-code',
      script: 'exit 42',
      expected: '',
      expectedExitCode: 42 },
    // stdin without trailing newline (we append \n — verify last line reads)
    { name: 'stdin-no-trailing-nl',
      script: 'while IFS= read -r line; do echo "$line"; done',
      stdin: 'a\nb\nc',
      expected: 'a\nb\nc' },
    // grep uses =~ regex: . matches any character
    { name: 'grep-dot-regex',
      script: "printf 'hello\\nhxllo\\n' > /tmp/gd.txt\ngrep 'h.llo' /tmp/gd.txt",
      expected: 'hello\nhxllo' },
    // =~ (POSIX regex via zsh/regex module, linked statically)
    { name: 'regex-basic',
      script: '[[ hello =~ ell ]] && echo yes || echo no',
      expected: 'yes' },
    { name: 'regex-dot',
      script: '[[ hello =~ h.llo ]] && echo yes || echo no',
      expected: 'yes' },
    { name: 'regex-no-match',
      script: '[[ hello =~ xyz ]] && echo yes || echo no',
      expected: 'no' },
    // control flow (extended)
    { name: 'while-loop',
      script: 'i=1; while (( i <= 3 )); do echo $i; (( i++ )); done',
      expected: '1\n2\n3' },
    { name: 'case-stmt',
      script: 'x=hello; case $x in hello) echo yes ;; *) echo no ;; esac',
      expected: 'yes' },
    { name: 'command-subst',
      script: 'result=$(echo hello); echo $result',
      expected: 'hello' },
    // head/tail defaults
    { name: 'head-default',
      script: "printf 'l1\\nl2\\nl3\\nl4\\nl5\\nl6\\nl7\\nl8\\nl9\\nl10\\nl11\\nl12\\n' > /tmp/hddef.txt\nhead /tmp/hddef.txt",
      expected: 'l1\nl2\nl3\nl4\nl5\nl6\nl7\nl8\nl9\nl10' },
    { name: 'tail-default',
      script: "printf 'l1\\nl2\\nl3\\nl4\\nl5\\nl6\\nl7\\nl8\\nl9\\nl10\\nl11\\nl12\\n' > /tmp/tldef.txt\ntail /tmp/tldef.txt",
      expected: 'l3\nl4\nl5\nl6\nl7\nl8\nl9\nl10\nl11\nl12' },
    // grep regex quantifiers
    { name: 'grep-plus',
      script: "printf 'a\\naa\\naaa\\nb\\n' > /tmp/grplus.txt\ngrep 'a+' /tmp/grplus.txt",
      expected: 'a\naa\naaa' },
    { name: 'grep-optional',
      script: "printf 'ct\\ncat\\ncaat\\n' > /tmp/gropt.txt\ngrep 'ca?t' /tmp/gropt.txt",
      expected: 'ct\ncat' },
    { name: 'grep-braces',
      script: "printf 'cat\\ncaat\\ncaaat\\n' > /tmp/grbrk.txt\ngrep 'ca{2}t' /tmp/grbrk.txt",
      expected: 'caat' },
    // grep multiple files
    { name: 'grep-multifile',
      script: "printf 'hello\\n' > /tmp/gmf1.txt\nprintf 'world\\n' > /tmp/gmf2.txt\ngrep 'o' /tmp/gmf1.txt /tmp/gmf2.txt",
      expected: 'hello\nworld' },
    // sort combined flags
    { name: 'sort-rn',
      script: "printf '10\\n9\\n2\\n100\\n' > /tmp/srn.txt\nsort -rn /tmp/srn.txt",
      expected: '100\n10\n9\n2' },
    // cut open-ended ranges
    { name: 'cut-open-end',
      script: "printf 'a:b:c:d\\n1:2:3:4\\n' > /tmp/ctoe.txt\ncut -d: -f3- /tmp/ctoe.txt",
      expected: 'c:d\n3:4' },
    { name: 'cut-open-start',
      script: "printf 'a:b:c:d\\n1:2:3:4\\n' > /tmp/ctos.txt\ncut -d: -f-2 /tmp/ctos.txt",
      expected: 'a:b\n1:2' },
    // wc multiple files
    { name: 'wc-multifile',
      script: "printf 'a\\nb\\n' > /tmp/wm1.txt\nprintf 'x\\ny\\nz\\n' > /tmp/wm2.txt\nwc -l /tmp/wm1.txt /tmp/wm2.txt",
      expected: '2 /tmp/wm1.txt\n3 /tmp/wm2.txt' },
    // sed: basic substitution (uses file arg; C-level stdin bypasses zsh pipe sim)
    { name: 'sed-sub',
      script: "printf 'hello world\\n' > /tmp/ss.txt\nsed 's/world/zsh/' /tmp/ss.txt",
      expected: 'hello zsh' },
    // sed: global substitution
    { name: 'sed-sub-global',
      script: "printf 'aabbaa\\n' > /tmp/ssg.txt\nsed 's/a/x/g' /tmp/ssg.txt",
      expected: 'xxbbxx' },
    // sed: delete matching lines
    { name: 'sed-delete',
      script: "printf 'keep\\ndelete me\\nkeep too\\n' > /tmp/sd.txt\nsed '/delete/d' /tmp/sd.txt",
      expected: 'keep\nkeep too' },
    // sed: print only matching lines (-n with /p)
    { name: 'sed-print-match',
      script: "printf 'apple\\nbanana\\napricot\\n' > /tmp/spm.txt\nsed -n '/^a/p' /tmp/spm.txt",
      expected: 'apple\napricot' },
    // sed: multiple -e expressions
    { name: 'sed-multi-expr',
      script: "printf 'foo bar\\n' > /tmp/sme.txt\nsed -e 's/foo/baz/' -e 's/bar/qux/' /tmp/sme.txt",
      expected: 'baz qux' },
    // sed: address range substitution
    { name: 'sed-addr-range',
      script: "printf 'a\\nb\\nc\\nd\\n' > /tmp/sar.txt\nsed '2,3s/.*/X/' /tmp/sar.txt",
      expected: 'a\nX\nX\nd' },
    // sed: in-place editing
    { name: 'sed-inplace',
      script: "echo hello > /tmp/si.txt\nsed -i '' 's/hello/world/' /tmp/si.txt\ncat /tmp/si.txt",
      expected: 'world' },
    // sed: print single line by number
    { name: 'sed-line-print',
      script: "printf 'a\\nb\\nc\\n' > /tmp/slp.txt\nsed -n '2p' /tmp/slp.txt",
      expected: 'b' },
    // string operations (parameter expansion — no fork)
    { name: 'string-length',
      script: 's=hello; echo ${#s}',
      expected: '5' },
    { name: 'string-slice',
      script: 's=hello; echo ${s:1:3}',
      expected: 'ell' },
    { name: 'string-replace',
      script: 's=hello; echo ${s/l/r}',
      expected: 'herlo' },
    { name: 'string-strip-prefix',
      script: 's=foobar; echo ${s#foo}',
      expected: 'bar' },
    { name: 'string-strip-suffix',
      script: 's=foobar; echo ${s%bar}',
      expected: 'foo' },
    { name: 'param-default',
      script: "x=''; echo ${x:-hello}",
      expected: 'hello' },
    // brace expansion
    { name: 'brace-range',
      script: 'echo {1..5}',
      expected: '1 2 3 4 5' },
    { name: 'brace-list',
      script: 'echo {a,b,c}',
      expected: 'a b c' },
    // array operations
    { name: 'array-join',
      script: 'a=(a b c); echo ${(j:,:)a}',
      expected: 'a,b,c' },
    { name: 'array-element',
      script: 'a=(x y z); echo $a[2]',
      expected: 'y' },
    { name: 'assoc-array',
      script: 'typeset -A h; h[key]=val; echo $h[key]',
      expected: 'val' },
    // redirect
    { name: 'append-redirect',
      script: 'echo a > /tmp/ar.txt; echo b >> /tmp/ar.txt; cat /tmp/ar.txt',
      expected: 'a\nb' },
    // logical operators
    { name: 'and-chain',
      script: 'true && echo yes',
      expected: 'yes' },
    { name: 'or-chain',
      script: 'false || echo yes',
      expected: 'yes' },
    // printf format
    { name: 'printf-pad',
      script: "printf '%05d\\n' 42",
      expected: '00042' },
    // $(< file) — resolved without fork via simple_redir_name() fast path
    { name: 'file-read-subst',
      script: "echo hello > /tmp/frs.txt; echo $(< /tmp/frs.txt)",
      expected: 'hello' },
    // command substitution (requires in-process capture patch in exec.c)
    { name: 'cmd-subst-nested',
      script: 'x=$(echo world); echo hello $x',
      expected: 'hello world' },
    // zsh/files module builtins (linked statically, no fork)
    { name: 'zf-rm',
      script: "echo test > /tmp/zfr.txt; zf_rm /tmp/zfr.txt; [[ ! -f /tmp/zfr.txt ]] && echo gone || echo present",
      expected: 'gone' },
    // zsh/stat module (linked statically, no fork)
    { name: 'zstat-size',
      script: "printf 'hello\\n' > /tmp/zst.txt; zstat -H s /tmp/zst.txt; echo $s[size]",
      expected: '6' },
    // file test operators
    { name: 'file-test-f',
      script: "echo x > /tmp/ftf.txt; [[ -f /tmp/ftf.txt ]] && echo yes || echo no",
      expected: 'yes' },
    { name: 'file-test-d',
      script: "mkdir -p /tmp/ftd; [[ -d /tmp/ftd ]] && echo yes || echo no",
      expected: 'yes' },
    // exit status capture
    { name: 'exit-status',
      script: 'false; echo $?',
      expected: '1' },
    // awk builtin (file-based — no fork/pipes required)
    { name: 'awk-print',
      script: "echo 'hello world' > /tmp/awk1.txt; awk '{print $2}' /tmp/awk1.txt",
      expected: 'world' },
    { name: 'awk-sum',
      script: "printf '1\\n2\\n3\\n4\\n5\\n' > /tmp/awk2.txt; awk '{s+=$1} END{print s}' /tmp/awk2.txt",
      expected: '15' },
    { name: 'awk-field-sep',
      script: "echo 'a:b:c' > /tmp/awk3.txt; awk -F: '{print $2}' /tmp/awk3.txt",
      expected: 'b' },
    { name: 'awk-pattern',
      script: "printf 'foo\\nbar\\nbaz\\n' > /tmp/awk4.txt; awk '/ba/' /tmp/awk4.txt",
      expected: 'bar\nbaz' },
    { name: 'awk-nf',
      script: "echo 'one two three' > /tmp/awk5.txt; awk '{print NF}' /tmp/awk5.txt",
      expected: '3' },
    { name: 'awk-gsub',
      script: "echo 'hello world' > /tmp/awk6.txt; awk '{gsub(/o/,\"0\"); print}' /tmp/awk6.txt",
      expected: 'hell0 w0rld' },
    { name: 'awk-var',
      script: "awk -v x=42 'BEGIN{print x}'",
      expected: '42' },
    { name: 'awk-file',
      script: "printf 'a\\nb\\nc\\n' > /tmp/awk7.txt; awk '{print NR, $0}' /tmp/awk7.txt",
      expected: '1 a\n2 b\n3 c' },
    { name: 'awk-sub',
      script: "echo 'aaa' > /tmp/asub.txt; awk '{sub(/a/,\"X\"); print}' /tmp/asub.txt",
      expected: 'Xaa' },
    { name: 'awk-length',
      script: "echo 'hello' > /tmp/alen.txt; awk '{print length($0)}' /tmp/alen.txt",
      expected: '5' },
    { name: 'awk-printf-fmt',
      script: "awk 'BEGIN{printf \"%05d\\n\", 42}'",
      expected: '00042' },
    { name: 'awk-fnr',
      script: "printf 'a\\nb\\n' > /tmp/anf1.txt; printf 'x\\n' > /tmp/anf2.txt; awk 'FNR==1{print FILENAME}' /tmp/anf1.txt /tmp/anf2.txt",
      expected: '/tmp/anf1.txt\n/tmp/anf2.txt' },
    // awk: arrays, user-defined functions, string functions (gaps in coverage)
    { name: 'awk-arrays',
      script: "printf 'a\\nb\\na\\n' > /tmp/awar.txt\nawk '{a[$0]++} END{print a[\"a\"], a[\"b\"]}' /tmp/awar.txt",
      expected: '2 1' },
    { name: 'awk-func',
      script: "awk 'function dbl(x){return x*2} BEGIN{print dbl(21)}'",
      expected: '42' },
    { name: 'awk-substr',
      script: "awk 'BEGIN{print substr(\"hello\", 2, 3)}'",
      expected: 'ell' },
    { name: 'awk-split-fn',
      script: "awk 'BEGIN{n=split(\"a:b:c\",arr,\":\"); print n, arr[2]}'",
      expected: '3 b' },
    // sed: back-references
    { name: 'sed-backref',
      script: "printf 'foo\\n' > /tmp/sbr.txt\nsed 's/\\(foo\\)/[\\1]/' /tmp/sbr.txt",
      expected: '[foo]' },
    // cat: multiple files
    { name: 'cat-multifile',
      script: "printf 'line1\\n' > /tmp/cmf1.txt\nprintf 'line2\\n' > /tmp/cmf2.txt\ncat /tmp/cmf1.txt /tmp/cmf2.txt",
      expected: 'line1\nline2' },
    // head/tail: short -N form (shim supports [[ $1 == -[0-9]* ]])
    { name: 'head-short-form',
      script: "printf 'l1\\nl2\\nl3\\nl4\\nl5\\n' > /tmp/hsf.txt\nhead -3 /tmp/hsf.txt",
      expected: 'l1\nl2\nl3' },
    { name: 'tail-short-form',
      script: "printf 'l1\\nl2\\nl3\\nl4\\nl5\\n' > /tmp/tsf.txt\ntail -3 /tmp/tsf.txt",
      expected: 'l3\nl4\nl5' },
    // tr: custom char mapping (not the a-z/A-Z fast path)
    { name: 'tr-custom',
      script: "printf 'abc\\n' > /tmp/trcus.txt\ntr 'abc' 'xyz' < /tmp/trcus.txt",
      expected: 'xyz' },
    // here strings (no pipe/fork needed — zsh uses temp file internally)
    { name: 'here-string',
      script: "read v <<< 'hello world'; echo $v",
      expected: 'hello world' },
    { name: 'here-string-tr',
      script: "tr 'a-z' 'A-Z' <<< 'hello'",
      expected: 'HELLO' },
    // heredoc
    { name: 'heredoc',
      script: "tr 'a-z' 'A-Z' <<'EOF'\nhello\nEOF",
      expected: 'HELLO' },
    // read -A into array
    { name: 'read-array',
      script: "read -A arr <<< 'one two three'; echo $arr[2]",
      expected: 'two' },
    // regex: capture groups via $match
    { name: 'regex-groups',
      script: "[[ 'foo123' =~ '([a-z]+)([0-9]+)' ]]; echo \"$match[1] $match[2]\"",
      expected: 'foo 123' },
    // arithmetic: modulo and negative numbers
    { name: 'arith-modulo',
      script: "echo $(( 10 % 3 ))",
      expected: '1' },
    { name: 'arith-negative',
      script: "echo $(( -5 + 3 ))",
      expected: '-2' },
    // printf with multiple args (repeats format string)
    { name: 'printf-multi',
      script: "printf '%s\\n' a b c",
      expected: 'a\nb\nc' },
    // typeset -i integer variable
    { name: 'typeset-int',
      script: "typeset -i n=5; n+=3; echo $n",
      expected: '8' },
    { name: 'zsh-mathfunc',
      script: "zmodload zsh/mathfunc; echo $(( int(sqrt(16)) ))",
      expected: '4' },
    // file test: -e (exists) and -s (non-empty)
    { name: 'file-test-e',
      script: "echo x > /tmp/fte.txt; [[ -e /tmp/fte.txt ]] && echo yes || echo no",
      expected: 'yes' },
    { name: 'file-test-s',
      script: "echo x > /tmp/fts.txt; [[ -s /tmp/fts.txt ]] && echo yes || echo no",
      expected: 'yes' },
    // parameter expansion: join with custom separator
    { name: 'param-join-sep',
      script: "a=(a b c); echo \${(j:-:)a}",
      expected: 'a-b-c' },
    // mv: verify source is removed (not just destination has content)
    { name: 'mv-removes-src',
      script: "echo hi > /tmp/mvsrc2.txt; mv /tmp/mvsrc2.txt /tmp/mvdst2.txt; [[ ! -f /tmp/mvsrc2.txt ]] && echo gone || echo present",
      expected: 'gone' },
    // knownFail: subshell requires fork
    { name: 'subshell',
      script: "(echo inner); echo outer",
      expected: 'inner\nouter',
      knownFail: true },
    // knownFail: pipes require fork — neither side of | works without it
    { name: 'pipe-simple',
      script: "echo hello | grep hello",
      expected: 'hello',
      knownFail: true },
    // pipe fork failure produces a helpful diagnostic, not a raw system error
    { name: 'pipe-helpful-error',
      script: "echo hello | grep hello",
      expected: 'zsh-wasm:',
      checkStderr: true,
      matchIncludes: true },
    { name: 'grep-stdin',
      script: "grep hello <<< 'hello world'",
      expected: 'hello world' },
    { name: 'cat-stdin',
      script: "cat <<< 'hello world'",
      expected: 'hello world' },
    { name: 'wc-stdin',
      script: "wc -l <<< 'hello world'",
      expected: '1' },
    // sort: -k field sort
    { name: 'sort-k',
      script: "printf 'banana 2\\napple 1\\ncherry 3\\n' > /tmp/sk.txt\nsort -k2 /tmp/sk.txt",
      expected: 'apple 1\nbanana 2\ncherry 3' },
    { name: 'sort-k-numeric',
      script: "printf 'b 10\\na 9\\nc 2\\n' > /tmp/skn.txt\nsort -k2 -n /tmp/skn.txt",
      expected: 'c 2\na 9\nb 10' },
    // cut: -c character positions
    { name: 'cut-c',
      script: "printf 'hello\\nworld\\n' > /tmp/cutc.txt\ncut -c2-4 /tmp/cutc.txt",
      expected: 'ell\norl' },
    { name: 'cut-c-single',
      script: "printf 'hello\\nworld\\n' > /tmp/cutcs.txt\ncut -c1 /tmp/cutcs.txt",
      expected: 'h\nw' },
    // knownFail: grep shim does not support -A/-B context lines
    { name: 'grep-context',
      script: "printf 'a\\nfoo\\nb\\n' > /tmp/gca.txt\ngrep -A 1 foo /tmp/gca.txt",
      expected: 'foo\nb',
      knownFail: true },
    // tee shim
    { name: 'tee-file',
      script: "tee /tmp/tee1.txt <<< 'hello'; cat /tmp/tee1.txt",
      expected: 'hello\nhello' },
    { name: 'tee-append',
      script: "echo first > /tmp/tee2.txt; tee -a /tmp/tee2.txt <<< 'second'; cat /tmp/tee2.txt",
      expected: 'second\nfirst\nsecond' },
    // seq shim
    { name: 'seq-basic',
      script: "seq 5",
      expected: '1\n2\n3\n4\n5' },
    { name: 'seq-range',
      script: "seq 3 7",
      expected: '3\n4\n5\n6\n7' },
    { name: 'seq-step',
      script: "seq 0 2 10",
      expected: '0\n2\n4\n6\n8\n10' },
    // mktemp shim
    { name: 'mktemp-file',
      script: "f=$(mktemp); echo hello > $f; cat $f",
      expected: 'hello' },
    { name: 'mktemp-dir',
      script: "d=$(mktemp -d); [[ -d $d ]] && echo yes || echo no",
      expected: 'yes' },
    { name: 'mktemp-template',
      script: "f=$(mktemp /tmp/mytest.XXXXXX); [[ -f $f ]] && echo yes || echo no",
      expected: 'yes' },
    // sleep shim (no-op in wasm — just confirm it doesn't error)
    { name: 'sleep-noop',
      script: "sleep 1; echo ok",
      expected: 'ok' },
    // basename shim
    { name: 'basename-basic',
      script: "basename /foo/bar",
      expected: 'bar' },
    { name: 'basename-suffix',
      script: "basename /foo/bar.txt .txt",
      expected: 'bar' },
    { name: 'basename-nopath',
      script: "basename foo",
      expected: 'foo' },
    { name: 'basename-trailing-slash',
      script: "basename /foo/bar/",
      expected: 'bar' },
    // dirname shim
    { name: 'dirname-basic',
      script: "dirname /foo/bar",
      expected: '/foo' },
    { name: 'dirname-relative',
      script: "dirname foo/bar",
      expected: 'foo' },
    { name: 'dirname-root',
      script: "dirname /",
      expected: '/' },
    { name: 'dirname-nopath',
      script: "dirname foo",
      expected: '.' },
    // rm shim
    { name: 'rm-file',
      script: "echo x > /tmp/rmf.txt; rm /tmp/rmf.txt; [[ ! -f /tmp/rmf.txt ]] && echo gone || echo present",
      expected: 'gone' },
    { name: 'rm-force',
      script: "rm -f /tmp/nonexistent_xyz_abc; echo ok",
      expected: 'ok' },
    { name: 'rm-rf',
      script: "mkdir -p /tmp/rmrf_test/sub; echo a > /tmp/rmrf_test/f.txt; echo b > /tmp/rmrf_test/sub/g.txt; rm -rf /tmp/rmrf_test; [[ ! -d /tmp/rmrf_test ]] && echo gone || echo present",
      expected: 'gone' },
    // bc builtin
    { name: 'bc-basic',
      script: "bc <<< '1+1'",
      expected: '2' },
    { name: 'bc-scale',
      script: "bc <<< 'scale=4; 22/7'",
      expected: '3.1428' },
    { name: 'bc-sqrt',
      script: "bc <<< 'scale=6; sqrt(2)'",
      expected: '1.414213' },
    { name: 'bc-func',
      script: "bc <<< 'define f(n) { if (n <= 1) return 1; return n * f(n-1); } f(10)'",
      expected: '3628800' },
    { name: 'bc-heredoc',
      script: "bc << 'EOF'\nscale=2\n10/3\nEOF",
      expected: '3.33' },
];

const tbody = document.getElementById('results');
const summary = document.getElementById('summary');
let passed = 0, failed = 0, xfailed = 0;
let initialPassDone = false;

function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function addRow(t) {
    const kf = !!t.knownFail;
    const tr = document.createElement('tr');
    tr.id = 'row-' + t.name;
    tr.className = 'expandable';
    tr.dataset.status = 'pending';
    if (kf) tr.setAttribute('data-known-fail', '');
    tr.innerHTML = `
        <td class="test-name"><span class="expand-chevron">▶</span>${esc(t.name)}<button class="rerun-btn" disabled title="Re-run this test">↺</button></td>
        <td><span class="status-pend" data-test-status="pending">—</span></td>
        <td></td>`;

    // Detail row (hidden until expanded)
    const detailTr = document.createElement('tr');
    detailTr.className = 'detail-row';
    detailTr.style.display = 'none';
    detailTr.innerHTML = `<td colspan="3"><pre class="script-code">${esc(t.script)}${
        t.stdin != null ? `\n<span class="stdin-label"># stdin: ${esc(t.stdin)}</span>` : ''
    }</pre><div class="output-section" style="display:none"></div></td>`;
    tr._detailTr = detailTr;

    tbody.appendChild(tr);
    tbody.appendChild(detailTr);

    // Click name cell to toggle script view (ignore clicks on the rerun button)
    tr.querySelector('.test-name').addEventListener('click', e => {
        if (e.target.closest('.rerun-btn')) return;
        const open = detailTr.style.display !== 'none';
        detailTr.style.display = open ? 'none' : 'table-row';
        tr.querySelector('.expand-chevron').textContent = open ? '▶' : '▼';
    });

    tr.querySelector('.rerun-btn').addEventListener('click', () => runTest(t, tr));
    return tr;
}

function updateRow(tr, pass, actual, expectedStr, knownFail = false) {
    const statusEl = tr.querySelector('[data-test-status]');
    if (pass) {
        statusEl.className = 'status-pass';
        statusEl.textContent = 'pass';
        statusEl.setAttribute('data-test-status', 'pass');
        tr.cells[2].innerHTML = '';
    } else if (knownFail) {
        statusEl.className = 'status-xfail';
        statusEl.textContent = 'xfail';
        statusEl.setAttribute('data-test-status', 'xfail');
        tr.cells[2].innerHTML =
            `<pre class="detail">expected: ${esc(expectedStr)}\n  actual: ${esc(actual)}</pre>`;
    } else {
        statusEl.className = 'status-fail';
        statusEl.textContent = 'FAIL';
        statusEl.setAttribute('data-test-status', 'fail');
        tr.cells[2].innerHTML =
            `<pre class="detail">expected: ${esc(expectedStr)}\n  actual: ${esc(actual)}</pre>`;
    }
}

function updateDetailOutput(tr, pass, actual) {
    const section = tr._detailTr?.querySelector('.output-section');
    if (!section) return;
    const cls = pass ? 'output-pass' : 'output-fail';
    const content = actual
        ? esc(actual)
        : `<span class="output-empty">(no output)</span>`;
    section.style.display = '';
    section.innerHTML = `<pre class="output-code ${cls}">${content}</pre>`;
}

function updateSummary() {
    const done = passed + failed + xfailed;
    let text;
    if (!initialPassDone) {
        text = `Running ${done} / ${tests.length}…`;
        summary.className = '';
    } else {
        text = `${passed} / ${tests.length} passed`;
        if (failed) text += ` — ${failed} FAILED`;
        if (xfailed) text += ` — ${xfailed} expected failure${xfailed > 1 ? 's' : ''}`;
        summary.className = failed ? 'has-fail' : 'all-pass';
    }
    summary.textContent = text;
}

async function runTest(t, tr) {
    const kf = !!t.knownFail;
    const prev = tr.dataset.status;

    // Adjust counters: remove old result
    if (prev === 'pass') passed--;
    else if (prev === 'fail') failed--;
    else if (prev === 'xfail') xfailed--;

    tr.dataset.status = 'running';
    const statusEl = tr.querySelector('[data-test-status]');
    statusEl.className = 'status-run';
    statusEl.textContent = 'running';
    statusEl.setAttribute('data-test-status', 'running');
    tr.cells[2].innerHTML = '';
    const outputSection = tr._detailTr?.querySelector('.output-section');
    if (outputSection) {
        outputSection.style.display = '';
        outputSection.innerHTML = `<pre class="output-code output-run">running…</pre>`;
    }
    updateSummary();

    let result;
    try {
        result = await runZshScript(t.script, { stdin: t.stdin ?? null });
    } catch(e) {
        result = { stdout: '', stderr: String(e), exitCode: 1 };
    }

    const actual = t.checkStderr ? result.stderr : result.stdout.trim();
    let pass, expectedStr;
    if (t.expected !== undefined) {
        expectedStr = t.expected;
        pass = t.matchIncludes ? actual.includes(t.expected) : actual === t.expected.trim();
    } else {
        expectedStr = `contains: ${t.expected_contains}`;
        pass = actual.includes(t.expected_contains);
    }
    if (pass && t.expectedExitCode !== undefined) {
        if (result.exitCode !== t.expectedExitCode) {
            pass = false;
            expectedStr += ` (exit ${t.expectedExitCode})`;
        }
    }

    const newStatus = pass ? 'pass' : (kf ? 'xfail' : 'fail');
    tr.dataset.status = newStatus;
    if (pass) passed++;
    else if (kf) xfailed++;
    else failed++;

    updateRow(tr, pass, actual, expectedStr, kf);
    updateDetailOutput(tr, pass, actual);
    updateSummary();
}

// Pre-render all rows, then run sequentially
summary.textContent = `Running 0 / ${tests.length}…`;
const rows = tests.map(t => addRow(t));

for (let i = 0; i < tests.length; i++) {
    await runTest(tests[i], rows[i]);
    rows[i].querySelector('.rerun-btn').disabled = false;
}

initialPassDone = true;
updateSummary();
document.body.setAttribute('data-tests-complete', '');
</script>
</body>
