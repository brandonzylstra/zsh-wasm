name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          taggedVersion="${GITHUB_REF_NAME#v}"
          packageVersion="$(node -p "require('./npm/package.json').version")"
          if [ "$taggedVersion" != "$packageVersion" ]; then
            echo "Tag $GITHUB_REF_NAME (version $taggedVersion) does not match npm/package.json version $packageVersion" >&2
            exit 1
          fi
          echo "Publishing version $packageVersion"

      - name: Stage built files from web/
        run: |
          # The wasm build requires Emscripten (too heavy for CI), so npm/ does
          # not track the binaries — but web/ commits them. Copy the committed
          # build outputs into npm/ before publishing (same set bin/build --out
          # npm/ produces). Whatever is in web/ at the tagged commit is what ships.
          for builtFile in zsh.js zsh.wasm zsh-runtime.js zsh-worker.js; do
            if [ ! -f "web/$builtFile" ]; then
              echo "MISSING: web/$builtFile at this tag — cannot publish" >&2
              exit 1
            fi
            cp "web/$builtFile" "npm/$builtFile"
          done

      - name: Publish
        working-directory: npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
